<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Browser Console</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        width: 320px;
        margin: 0;
        color: #0f172a;
        background: #f8fafc;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
        line-height: 1.3;
      }

      .card {
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 14px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #ef4444;
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.14);
      }

      .dot.connected {
        background: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
      }

      #statusText {
        font-weight: 700;
      }

      dl {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px 12px;
        margin: 0;
        font-size: 13px;
      }

      dt {
        color: #64748b;
      }

      dd {
        margin: 0;
        font-variant-numeric: tabular-nums;
      }

      .hint {
        margin: 12px 0 0;
        color: #64748b;
        font-size: 12px;
        line-height: 1.5;
      }

      @media (prefers-color-scheme: dark) {
        body {
          color: #e2e8f0;
          background: #020617;
        }

        .card {
          border-color: #1e293b;
          background: #0f172a;
          box-shadow: none;
        }

        dt,
        .hint {
          color: #94a3b8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MCP Browser Console</h1>
      <section class="card" aria-live="polite">
        <div class="status-row">
          <span id="statusDot" class="dot" aria-hidden="true"></span>
          <span id="statusText">Checking connection…</span>
        </div>
        <dl>
          <dt>WebSocket</dt>
          <dd id="socketState">unknown</dd>
          <dt>Queued events</dt>
          <dd id="queuedEvents">0</dd>
          <dt>Tracked tabs</dt>
          <dd id="trackedTabs">0</dd>
          <dt>Last connected</dt>
          <dd id="lastConnectedAt">never</dd>
        </dl>
        <p id="lastError" class="hint"></p>
      </section>
      <p class="hint">
        Start the MCP server locally; the extension connects to
        ws://localhost:3712 automatically.
      </p>
    </main>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
